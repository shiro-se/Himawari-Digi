<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
  <h2>PWA Icon Generator</h2>
  <p>Klik tombol untuk membuat ikon dari logo.</p>
  <button id="gen" style="padding:12px 24px; font-size:16px; cursor:pointer;">Generate Icons</button>
  <div id="output" style="margin-top:20px;"></div>

  <script>
    document.getElementById('gen').addEventListener('click', async () => {
      const output = document.getElementById('output');
      output.innerHTML = 'Memproses...';

      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const sizes = [192, 512];
        const links = [];

        sizes.forEach(size => {
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');

          // Fill with white background (since JPG has no transparency)
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, size, size);

          // Draw image centered and cover the canvas
          const scale = Math.max(size / img.width, size / img.height);
          const w = img.width * scale;
          const h = img.height * scale;
          const x = (size - w) / 2;
          const y = (size - h) / 2;
          ctx.drawImage(img, x, y, w, h);

          const dataUrl = canvas.toDataURL('image/png');
          
          // Create download link
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = `icon-${size}x${size}.png`;
          a.textContent = `Download icon-${size}x${size}.png`;
          a.style.cssText = 'display:block; margin:10px 0; font-size:18px;';
          links.push(a);

          // Show preview
          const preview = document.createElement('img');
          preview.src = dataUrl;
          preview.style.cssText = `width:${Math.min(size, 192)}px; height:${Math.min(size, 192)}px; border:1px solid #ccc; margin:10px;`;
          links.push(preview);
        });

        output.innerHTML = '<h3>Icons berhasil dibuat! Klik untuk download:</h3>';
        links.forEach(el => output.appendChild(el));
      };
      img.onerror = () => { output.innerHTML = 'Gagal memuat gambar logo.'; };
      img.src = '/assets/logo/himawari-logo.jpg';
    });
  </script>
</body>
</html>
